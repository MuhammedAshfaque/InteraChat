<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Include Feathers icons for nice SVGs -->
  <script src="https://unpkg.com/feather-icons"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- DASHBOARD VIEW -->
  <div id="chat-view" class="chat-app">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h3 id="current-username">Dashboard</h3>
        <div class="sidebar-actions">
          <button id="create-group-btn" class="btn-icon" title="New Group">
            <i data-feather="plus"></i>
          </button>
          <button id="logout-btn" class="btn-icon logout-btn" title="Logout">
            <i data-feather="log-out"></i>
          </button>
        </div>
      </div>
      
      <div class="section-title">Groups</div>
      <ul id="group-list" class="group-list">
        <!-- Dynamically populated -->
      </ul>

      <div class="section-title">Direct Messages</div>
      <ul id="user-list" class="user-list">
        <!-- Dynamically populated -->
      </ul>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div id="empty-chat-state" class="empty-chat">
        <h2>Select a chat</h2>
        <p>Choose a user or group to start messaging</p>
      </div>

      <div id="active-chat-container" class="hidden" style="display: flex; flex-direction: column; width: 100%; height: 100%;">
        <div class="chat-header">
          <div id="chat-header-avatar" class="avatar">U</div>
          <div id="chat-header-name" class="item-name">User Name</div>
        </div>
        
        <div id="messages-container" class="messages">
          <!-- Messages will appear here -->
        </div>

        <form id="chat-form" class="chat-input" enctype="multipart/form-data">
          <!-- Hidden file input -->
          <input type="file" id="image-upload-input" accept="image/*" class="hidden">
          
          <!-- Image upload button -->
          <button type="button" id="trigger-upload-btn" class="btn-icon" title="Send a Photo" style="width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.05);">
            <i data-feather="image"></i>
          </button>

          <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
          <button type="submit" class="send-btn">
            <i data-feather="send"></i>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Create Group Modal -->
  <div id="create-group-modal" class="modal">
    <div class="modal-content">
      <h3>Create New Group</h3>
      <div class="form-group">
        <label>Group Name</label>
        <input type="text" id="new-group-name" placeholder="e.g. Study Group" required>
      </div>
      <div class="form-group">
        <label>Select Members</label>
        <div id="group-members-select" class="select-members">
          <!-- Dynamically filled with users -->
        </div>
      </div>
      <div class="modal-actions">
        <button id="close-modal-btn" class="btn-secondary">Cancel</button>
        <button id="confirm-create-group-btn" class="btn btn-primary">Create</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/chat.js"></script>
  <script>
    feather.replace();
  </script>
</body>
</html>
